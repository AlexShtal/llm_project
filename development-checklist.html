<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Development Checklist</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f7f8;
        --panel: #ffffff;
        --text: #172026;
        --muted: #65717a;
        --border: #d9e0e5;
        --accent: #256f68;
        --accent-soft: #e2f1ef;
        --done: #eef5ee;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #101417;
          --panel: #171d21;
          --text: #edf2f4;
          --muted: #9ca8b0;
          --border: #2c363d;
          --accent: #6fc3b9;
          --accent-soft: #18322f;
          --done: #15241d;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 32px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .progress {
        min-width: 220px;
        padding: 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      .progress-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 14px;
        margin-bottom: 8px;
      }

      .bar {
        height: 8px;
        overflow: hidden;
        background: var(--border);
        border-radius: 999px;
      }

      .bar span {
        display: block;
        width: 0%;
        height: 100%;
        background: var(--accent);
        transition: width 160ms ease;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }

      button {
        min-height: 36px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--panel);
        color: var(--text);
        padding: 0 12px;
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--accent);
      }

      section {
        margin-top: 14px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }

      h2 {
        margin: 0;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 18px;
        letter-spacing: 0;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      li {
        display: grid;
        grid-template-columns: 28px 1fr;
        gap: 10px;
        padding: 13px 16px;
        border-top: 1px solid var(--border);
      }

      li:first-child {
        border-top: 0;
      }

      li.done {
        background: var(--done);
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin: 3px 0 0;
        accent-color: var(--accent);
      }

      label {
        cursor: pointer;
      }

      strong {
        display: block;
        margin-bottom: 2px;
      }

      .note {
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 680px) {
        header {
          display: block;
        }

        .progress {
          margin-top: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Development Checklist</h1>
          <p>
            Интерактивный план разработки проекта. Прогресс сохраняется в этом
            браузере.
          </p>
        </div>
        <div class="progress" aria-live="polite">
          <div class="progress-row">
            <span>Готово</span>
            <strong id="progressText">0 / 0</strong>
          </div>
          <div class="bar"><span id="progressBar"></span></div>
        </div>
      </header>

      <div class="toolbar">
        <button type="button" id="checkAll">Отметить все</button>
        <button type="button" id="clearAll">Сбросить</button>
      </div>

      <div id="checklist"></div>
    </main>

    <script>
      const storageKey = "llm-project-development-checklist";

      const sections = [
        {
          title: "1. Настройка проекта",
          items: [
            [
              "fix-deps",
              "Исправить зависимости",
              "Добавить в package.json все пакеты, которые реально используются кодом.",
            ],
            [
              "prisma-generate",
              "Проверить Prisma client",
              "Убедиться, что prisma generate работает и клиент подключается к NestJS.",
            ],
            [
              "env-docs",
              "Описать переменные окружения",
              "Зафиксировать DATABASE_URL и другие обязательные настройки.",
            ],
            [
              "readme",
              "Обновить README",
              "Заменить стандартный NestJS README на инструкции именно для этого проекта.",
            ],
          ],
        },
        {
          title: "2. База данных и Prisma",
          items: [
            [
              "migration",
              "Проверить миграцию",
              "Применить схему к чистой PostgreSQL-базе и убедиться, что она совпадает с моделями.",
            ],
            [
              "seed",
              "Добавить seed-данные",
              "Создать тестового пользователя и базовые prompt templates для локальной разработки.",
            ],
            [
              "sessions-design",
              "Определить хранение сессий",
              "Решить, как создаются, истекают и отзываются токены.",
            ],
          ],
        },
        {
          title: "3. Авторизация",
          items: [
            [
              "register",
              "Регистрация",
              "Валидировать email, username и пароль, затем сохранять безопасный хеш.",
            ],
            ["login", "Логин", "Проверять учетные данные и создавать сессию."],
            [
              "auth-me",
              "Текущий пользователь",
              "Добавить GET /auth/me для восстановления сессии на клиенте.",
            ],
            ["logout", "Логаут", "Удалять или инвалидировать активную сессию."],
            [
              "guards",
              "Защита приватных маршрутов",
              "Закрыть чаты, настройки и историю от неавторизованных запросов.",
            ],
          ],
        },
        {
          title: "4. Чаты",
          items: [
            [
              "chat-crud",
              "Истории чатов",
              "Создавать, получать, переименовывать и удалять истории пользователя.",
            ],
            [
              "messages",
              "Сообщения",
              "Сохранять role, content, modelVersion и tokensUsed.",
            ],
            [
              "conversation",
              "Получение диалога",
              "Возвращать сообщения в правильном порядке.",
            ],
            [
              "llm-provider",
              "Интеграция LLM",
              "Выбрать API-провайдера и схему передачи настроек модели.",
            ],
          ],
        },
        {
          title: "5. Настройки пользователя",
          items: [
            [
              "settings-api",
              "API настроек",
              "Позволить читать и менять model, temperature, maxTokens, language и theme.",
            ],
            [
              "settings-validation",
              "Валидация настроек",
              "Не принимать недопустимые значения температуры, лимитов и моделей.",
            ],
          ],
        },
        {
          title: "6. Prompt Templates",
          items: [
            [
              "templates-crud",
              "CRUD шаблонов",
              "Создавать, читать, редактировать и удалять переиспользуемые промпты.",
            ],
            [
              "default-templates",
              "Дефолтные шаблоны",
              "Отдельно обработать системные шаблоны с isDefault.",
            ],
          ],
        },
        {
          title: "7. Валидация и ошибки",
          items: [
            [
              "dtos",
              "DTO",
              "Описать входные и выходные структуры для основных модулей.",
            ],
            [
              "validation-pipe",
              "ValidationPipe",
              "Включить глобальную валидацию NestJS.",
            ],
            [
              "errors",
              "Единый формат ошибок",
              "Сделать предсказуемые ответы для validation, auth, not found и conflict.",
            ],
          ],
        },
        {
          title: "8. Тесты",
          items: [
            [
              "e2e",
              "Починить E2E",
              "Сделать так, чтобы E2E-тесты проходили в чистом окружении.",
            ],
            [
              "auth-tests",
              "Тесты auth",
              "Покрыть регистрацию, логин, дубликаты, неверный пароль и logout.",
            ],
            [
              "chat-tests",
              "Тесты чатов",
              "Проверить создание, сообщения и запрет доступа к чужим данным.",
            ],
            [
              "db-test-strategy",
              "Стратегия БД для тестов",
              "Выбрать test DB, транзакции или мок Prisma.",
            ],
          ],
        },
        {
          title: "9. Безопасность",
          items: [
            [
              "password-hash",
              "Хеширование паролей",
              "Использовать bcrypt или argon2, не хранить пароль в открытом виде.",
            ],
            [
              "secrets",
              "Защита секретов",
              "Не коммитить .env, добавить .env.example.",
            ],
            [
              "cors",
              "CORS",
              "Настроить разрешенные origins перед подключением frontend.",
            ],
            [
              "rate-limit",
              "Rate limits",
              "Ограничить частоту login/register запросов.",
            ],
          ],
        },
        {
          title: "10. Подготовка к релизу",
          items: [
            [
              "lint-format",
              "Lint и format checks",
              "Сделать проверки, которые можно запускать в CI.",
            ],
            [
              "prod-start",
              "Production-инструкции",
              "Описать build, migrations, env и start:prod.",
            ],
            [
              "deploy-target",
              "Деплой",
              "Выбрать, где будут жить backend и PostgreSQL.",
            ],
          ],
        },
      ];

      const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
      const checklist = document.querySelector("#checklist");
      const progressText = document.querySelector("#progressText");
      const progressBar = document.querySelector("#progressBar");

      function save() {
        const state = {};
        document
          .querySelectorAll("input[type='checkbox']")
          .forEach((checkbox) => {
            state[checkbox.id] = checkbox.checked;
          });
        localStorage.setItem(storageKey, JSON.stringify(state));
      }

      function updateProgress() {
        const boxes = [...document.querySelectorAll("input[type='checkbox']")];
        const done = boxes.filter((box) => box.checked).length;
        const total = boxes.length;
        const percent = total === 0 ? 0 : Math.round((done / total) * 100);

        progressText.textContent = `${done} / ${total}`;
        progressBar.style.width = `${percent}%`;

        boxes.forEach((box) => {
          box.closest("li").classList.toggle("done", box.checked);
        });
      }

      function render() {
        checklist.innerHTML = sections
          .map((section) => {
            const items = section.items
              .map(([id, title, note]) => {
                const checked = saved[id] ? "checked" : "";
                return `
                  <li>
                    <input id="${id}" type="checkbox" ${checked} />
                    <label for="${id}">
                      <strong>${title}</strong>
                      <span class="note">${note}</span>
                    </label>
                  </li>
                `;
              })
              .join("");

            return `
              <section>
                <h2>${section.title}</h2>
                <ul>${items}</ul>
              </section>
            `;
          })
          .join("");

        document
          .querySelectorAll("input[type='checkbox']")
          .forEach((checkbox) => {
            checkbox.addEventListener("change", () => {
              save();
              updateProgress();
            });
          });

        updateProgress();
      }

      document.querySelector("#checkAll").addEventListener("click", () => {
        document.querySelectorAll("input[type='checkbox']").forEach((box) => {
          box.checked = true;
        });
        save();
        updateProgress();
      });

      document.querySelector("#clearAll").addEventListener("click", () => {
        document.querySelectorAll("input[type='checkbox']").forEach((box) => {
          box.checked = false;
        });
        save();
        updateProgress();
      });

      render();
    </script>
  </body>
</html>
